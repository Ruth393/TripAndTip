<div class="add-category">
  <h2>הוספת קטגוריה</h2>
  <form #catForm="ngForm" (ngSubmit)="addCategory()">
    <label for="category">שם קטגוריה</label>
    <input id="category" name="category" type="text" [(ngModel)]="model.category" required />
    <div *ngIf="error" class="error">{{ error }}</div>
    <div *ngIf="success" class="success">הקטגוריה נוספה בהצלחה</div>
    <button type="submit">הוסף קטגוריה</button>
  </form>
</div>
