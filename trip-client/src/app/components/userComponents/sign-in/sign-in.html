<div class="form-container">
    <h2>Sign In</h2>
    <form  #LogInForm="ngForm">
      <label>Name:   </label>
      <input type="text" [(ngModel)]="toSignIn.name" name="name" #Name="ngModel" required>
      @if(Name.errors){
        @if(Name.errors['required']){
        <span>שדה חובה</span>
      }
      }
        <br><br>
        <label>Email:   </label>
        <input type="email" [(ngModel)]="toSignIn.email" name="email" #email="ngModel" required>
        @if(email.errors){
          @if(email.errors['required']){
          <span>שדה חובה</span>
        }   

       
      }
    </form>
    <button (click)="signIn()" [disabled]="LogInForm.invalid">Sign In</button>

  </div>
