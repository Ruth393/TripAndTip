<div class="form-container">
  <mat-card class="login-card">
    <mat-card-title>
      <h2>התחברות</h2>
    </mat-card-title>

    <mat-card-content>
      <form #SignInForm="ngForm">
        <mat-form-field appearance="fill">
          <mat-label>אימייל</mat-label>
          <input
            matInput
            type="email"
            [(ngModel)]="toSignIn.email"
            name="email"
            #email="ngModel"
            required
            email
          />
          @if(email.errors && email.touched){
            @if(email.errors['required']){
              <mat-error>שדה חובה</mat-error>
            }
            @if(email.errors['email']){
              <mat-error>כתובת אימייל לא חוקית</mat-error>
            }
          }
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>סיסמה</mat-label>
          <input
            matInput
            type="password"
            [(ngModel)]="toSignIn.password"
            name="password"
            #password="ngModel"
            required
          />
          @if(password.errors && password.touched){
            @if(password.errors['required']){
              <mat-error>שדה חובה</mat-error>
            }
          }
           <img [src]="getImageSrc(toSignIn)" alt="תמונת משתמש" class="user-image-material" [hidden]="!getImageSrc(toSignIn)">
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions class="form-actions">
      <button
        mat-raised-button
        color="primary"
        (click)="signIn()"
        [disabled]="SignInForm.invalid">
        התחבר
      </button>
    </mat-card-actions>
  </mat-card>
</div>
