<div class="center-content-container">
  <mat-card class="signout-card">
    
    <mat-card-title>
      <h2>התנתקות</h2>
    </mat-card-title>
    
    <mat-card-content>
      <p>לחצת על כפתור היציאה? זה יסיים את הסשן וימחק את המידע מהמכשיר.</p>
      
      <div [hidden]="!loading" class="loading-message">
        <mat-progress-spinner 
          mode="indeterminate" 
          [diameter]="20" 
          color="accent">
        </mat-progress-spinner>
        מבוצע יציאה...
      </div>
      
      <mat-error *ngIf="error" class="error-message">{{ error }}</mat-error>
      
    </mat-card-content>

    <mat-card-actions class="actions-group">
      <button 
        mat-raised-button 
        color="warn" 
        (click)="signOut()" 
        [disabled]="loading">
        יציאה
      </button>
      
      <button 
        mat-stroked-button 
        color="basic" 
        (click)="cancel()" 
        [disabled]="loading">
        ביטול
      </button>
    </mat-card-actions>
  </mat-card>
</div>
