spring.application.name=Trip

spring.h2.console.enabled=true
spring.jpa.show-sql=true

spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.datasource.username=sa
spring.datasource.password=
spring.datasource.url=jdbc:h2:./DBTrip;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=true

server.max-http-request-header-size=1024KB

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

spring.ai.retry.max-attempts=2
spring.ai.retry.initial-interval=1000
spring.ai.retry.multiplier=2.0

spring.jpa.open-in-view=false

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.mvc.async.request-timeout=-1

server.tomcat.connection-timeout=600000

spring.security.strategy=MODE_INHERITABLETHREADLOCAL

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
logging.level.reactor.netty.http.client=DEBUG
```
logging.level.com.google.genai=DEBUG
logging.level.okhttp3=DEBUG
logging.level.root=INFO
logging.level.com.google=TRACE

logging.level.org.hibernate=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG


