spring.application.name=Trip

spring.h2.console.enabled=true
spring.jpa.show-sql=true

spring.datasource.username=sa
spring.datasource.password=
spring.datasource.url=jdbc:h2:./DBTrip;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=true

server.max-http-request-header-size=1024KB
spring.ai.openai.api-key=AIzaSyC7mbiIKy4-r1ZSaCnkQqfFAXuBZib1zao
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=gemini-1.5-flash

spring.ai.retry.max-attempts=2
spring.ai.retry.initial-interval=1000
spring.ai.retry.multiplier=2.0

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

spring.mvc.async.request-timeout=-1
server.tomcat.connection-timeout=600000

spring.security.strategy=MODE_INHERITABLETHREADLOCAL